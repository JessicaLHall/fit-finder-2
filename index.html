<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fit Finder</title>
  <style>
    :root {
      --bg: #09090e;
      --surface: #111118;
      --surface-2: #16161e;
      --border: #1f1f2e;
      --border-mid: #2a2a3a;
      --accent: #c9a96e;
      --accent-dim: #a8863f;
      --text: #f0f0f6;
      --text-muted: #80809a;
      --text-dim: #48485e;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 3rem 1rem 5rem;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    /* Number inputs */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .input-group label em {
      font-style: normal;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .input-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--text-dim); }

    /* Toggle rows */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.875rem 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .toggle-row:last-child { margin-bottom: 0; }

    .toggle-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .toggle-group {
      display: flex;
      gap: 0.25rem;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      transition: all 0.12s;
      line-height: 1.5;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .toggle-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    /* Search */
    .search-row {
      display: flex;
      gap: 0.6rem;
    }

    .search-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--text-dim); }

    .search-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #1a1206;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 800;
      padding: 0.7rem 1.1rem;
      transition: background 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .search-btn:hover { background: var(--accent-dim); color: #fff; }
    .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Results */
    #results { display: none; }
    #results.visible { display: block; }

    .result-shoe-name {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 0.4rem;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .result-category {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    /* Fit metrics */
    .metrics-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
    }

    .fit-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }

    .fit-metric {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-top: 3px solid transparent;
      border-radius: 8px;
      padding: 0.875rem 0.75rem 0.75rem;
      text-align: center;
    }

    .fit-metric.green { border-top-color: var(--green); }
    .fit-metric.amber { border-top-color: var(--amber); }
    .fit-metric.red   { border-top-color: var(--red); }
    .fit-metric.na    { opacity: 0.35; }

    .metric-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 0.45rem;
    }

    .metric-rec {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
      font-variant-numeric: tabular-nums;
      line-height: 1.3;
    }

    .metric-status {
      font-size: 0.68rem;
      font-weight: 600;
    }

    .metric-status.green { color: var(--green); }
    .metric-status.amber { color: var(--amber); }
    .metric-status.red   { color: var(--red); }
    .metric-status.na    { color: var(--text-dim); }

    /* Verdict */
    .verdict-row {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.875rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.1rem;
    }

    .verdict-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.35rem;
    }

    .verdict-pip.good,
    .verdict-pip.likely     { background: var(--green); }
    .verdict-pip.borderline { background: var(--amber); }
    .verdict-pip.poor       { background: var(--red); }
    .verdict-pip.unknown    { background: var(--text-dim); }

    .verdict-copy { font-size: 0.875rem; line-height: 1.55; color: var(--text-muted); }
    .verdict-copy strong { color: var(--text); font-weight: 700; }

    /* Notes */
    .notes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .notes-list li {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding-left: 1.1rem;
      position: relative;
      line-height: 1.6;
    }

    .notes-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* Loading */
    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem;
      font-size: 0.875rem;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* Error */
    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>Fit <span>Finder</span></h1>
      <p>Tell us about your feet. We'll tell you how a shoe fits.</p>
    </div>

    <div class="card">
      <div class="card-title">Your Foot Profile</div>
      <div class="input-grid">
        <div class="input-group">
          <label>Length (mm)</label>
          <input type="number" id="foot-length" placeholder="e.g. 260" min="180" max="320">
        </div>
        <div class="input-group">
          <label>Width (mm)</label>
          <input type="number" id="foot-width" placeholder="e.g. 95" min="60" max="130">
        </div>
        <div class="input-group">
          <label>Circumference <em>optional</em></label>
          <input type="number" id="foot-circ" placeholder="e.g. 235" min="180" max="310">
        </div>
      </div>
      <div class="divider"></div>
      <div class="toggle-row">
        <span class="toggle-label">Longest toe</span>
        <div class="toggle-group" id="tg-toe">
          <button class="toggle-btn active" data-value="big">Big</button>
          <button class="toggle-btn" data-value="second">Second</button>
          <button class="toggle-btn" data-value="even">Even</button>
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Arch type</span>
        <div class="toggle-group" id="tg-arch">
          <button class="toggle-btn" data-value="low">Low</button>
          <button class="toggle-btn active" data-value="medium">Medium</button>
          <button class="toggle-btn" data-value="high">High</button>
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Heel width</span>
        <div class="toggle-group" id="tg-heel">
          <button class="toggle-btn" data-value="narrow">Narrow</button>
          <button class="toggle-btn active" data-value="medium">Medium</button>
          <button class="toggle-btn" data-value="wide">Wide</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Search a Shoe</div>
      <div class="search-row">
        <input
          type="text"
          id="shoe-query"
          placeholder="Brand and model — e.g. Nike Air Max 90"
          autocomplete="off"
        >
        <button class="search-btn" id="search-btn">Find My Fit</button>
      </div>
    </div>

    <div id="results"></div>

  </div>

  <script>
    const PROFILE_KEY = 'fitfinder_v2_profile';

    // ── Profile ─────────────────────────────────────────────────────────────

    function getProfile() {
      return {
        footLen:    parseFloat(document.getElementById('foot-length').value) || null,
        footWidth:  parseFloat(document.getElementById('foot-width').value)  || null,
        footCirc:   parseFloat(document.getElementById('foot-circ').value)   || null,
        longestToe: getToggle('tg-toe'),
        archType:   getToggle('tg-arch'),
        heelWidth:  getToggle('tg-heel'),
      };
    }

    function getToggle(groupId) {
      const btn = document.querySelector(`#${groupId} .toggle-btn.active`);
      return btn ? btn.dataset.value : null;
    }

    function setToggle(groupId, value) {
      document.querySelectorAll(`#${groupId} .toggle-btn`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === value);
      });
    }

    function saveProfile() {
      localStorage.setItem(PROFILE_KEY, JSON.stringify(getProfile()));
    }

    function loadProfile() {
      const raw = localStorage.getItem(PROFILE_KEY);
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        if (p.footLen)    document.getElementById('foot-length').value = p.footLen;
        if (p.footWidth)  document.getElementById('foot-width').value  = p.footWidth;
        if (p.footCirc)   document.getElementById('foot-circ').value   = p.footCirc;
        if (p.longestToe) setToggle('tg-toe',  p.longestToe);
        if (p.archType)   setToggle('tg-arch', p.archType);
        if (p.heelWidth)  setToggle('tg-heel', p.heelWidth);
      } catch (e) {}
    }

    ['foot-length', 'foot-width', 'foot-circ'].forEach(id =>
      document.getElementById(id).addEventListener('input', saveProfile)
    );

    document.querySelectorAll('.toggle-group .toggle-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        this.closest('.toggle-group').querySelectorAll('.toggle-btn')
          .forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        saveProfile();
      });
    });

    loadProfile();

    // ── Search ───────────────────────────────────────────────────────────────

    document.getElementById('search-btn').addEventListener('click', doSearch);

    document.getElementById('shoe-query').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const query = document.getElementById('shoe-query').value.trim();
      if (!query) return;

      const profile = getProfile();
      if (!profile.footLen || !profile.footWidth) {
        showError('Pop your foot length and width in above before searching.');
        return;
      }

      const btn = document.getElementById('search-btn');
      btn.disabled = true;
      btn.textContent = 'Looking up…';
      showLoading();

      try {
        const resp = await fetch('/.netlify/functions/lookup-shoe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        if (!resp.ok) throw new Error('Server error ' + resp.status);

        const shoe = await resp.json();

        if (shoe.error) {
          showError("We couldn't find that shoe in our database. Try including the brand name, e.g. "Nike Air Max 90".");
        } else {
          showResults(shoe, profile);
        }
      } catch (e) {
        showError('Something went wrong looking that up — please check your connection and try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Find My Fit';
      }
    }

    // ── Fit logic ────────────────────────────────────────────────────────────

    function fitLength(footLen, shoe) {
      if (!shoe.lengthRange) return null;
      const thumbSpace = (shoe.category === 'heels') ? 8 : 10;
      const fitted = footLen + thumbSpace;
      const [min, max] = shoe.lengthRange;
      if (fitted >= min && fitted <= max) return 'green';
      if (fitted >= min - 7 && fitted <= max + 7) return 'amber';
      return 'red';
    }

    function fitWidth(footWidth, shoe) {
      if (!shoe.widths || Object.keys(shoe.widths).length === 0) return null;
      for (const [, [min, max]] of Object.entries(shoe.widths)) {
        if (footWidth >= min && footWidth <= max) return 'green';
      }
      for (const [, [min, max]] of Object.entries(shoe.widths)) {
        if (footWidth >= min - 3 && footWidth <= max + 3) return 'amber';
      }
      return 'red';
    }

    function bestWidthOption(footWidth, shoe) {
      if (!shoe.widths) return null;
      let best = null, bestDist = Infinity;
      for (const [name, [min, max]] of Object.entries(shoe.widths)) {
        const dist = Math.abs(footWidth - (min + max) / 2);
        if (dist < bestDist) { bestDist = dist; best = name; }
      }
      return best;
    }

    function fitToeBox(longestToe, shoe) {
      if (!shoe.toeBoxShape) return null;
      const shape = shoe.toeBoxShape;
      if (shape === 'square') return 'green';
      if (shape === 'round') return 'green';
      if (shape === 'tapered') {
        if (longestToe === 'second' || longestToe === 'even') return 'amber';
        return 'green';
      }
      return null;
    }

    function overallVerdict(fits) {
      const active = fits.filter(f => f !== null);
      if (active.length === 0) return 'unknown';
      if (active.includes('red')) return 'poor';
      if (active.every(f => f === 'green')) return 'good';
      if (active.filter(f => f === 'amber').length >= 2) return 'borderline';
      return 'likely';
    }

    function recommendedSize(footLen, shoe) {
      const thumbSpace = (shoe.category === 'heels') ? 8 : 10;
      const fitted = footLen + thumbSpace;
      const step = shoe.halfSizes === false ? 1 : 0.5;
      let rounded = Math.round((fitted / 6.67) / step) * step;
      if (shoe.sizing === 'runs_small') rounded += step;
      if (shoe.sizing === 'runs_large') rounded -= step;
      return 'EU\u00a0' + rounded;
    }

    function buildNotes(shoe, profile) {
      const notes = [];
      if (shoe.sizing === 'runs_small') notes.push('We\'ve recommended a size up — this shoe is known to come up small.');
      if (shoe.sizing === 'runs_large') notes.push('We\'ve recommended a size down — this shoe tends to run large.');
      if (shoe.fitNote) notes.push(shoe.fitNote);

      const { longestToe, archType, heelWidth } = profile;

      if (shoe.toeBoxShape === 'tapered' && (longestToe === 'second' || longestToe === 'even')) {
        notes.push('The tapered toe box may feel snug for your toe shape — a wide option or half size up could help.');
      }
      if (shoe.toeBoxShape === 'round' && longestToe === 'big') {
        notes.push('The round toe box should give your big toe plenty of room.');
      }
      if (archType === 'high' && (shoe.archSupport === 'neutral' || shoe.archSupport === 'mild')) {
        notes.push('This shoe has minimal arch support — an aftermarket insole may be worth considering.');
      }
      if (archType === 'low' && shoe.archSupport === 'high') {
        notes.push('The built-in arch support is quite pronounced, which can feel uncomfortable on flatter feet.');
      }
      if (heelWidth === 'narrow' && shoe.heelCupDepth === 'shallow') {
        notes.push('A shallow heel cup can cause slipping if you have a narrow heel — look for a more structured counter.');
      }
      if (heelWidth === 'wide' && shoe.heelCupDepth === 'deep') {
        notes.push('The deep heel cup may feel tight around a wider heel.');
      }
      return notes;
    }

    // ── Render ───────────────────────────────────────────────────────────────

    const VERDICT_LABEL = {
      good:       'Looks like a great fit',
      likely:     'Should fit you well',
      borderline: 'Worth trying in store',
      poor:       'Unlikely to be your fit',
      unknown:    'Not enough data to say',
    };

    const VERDICT_DESC = {
      good:       'All three dimensions sit comfortably within range for your foot.',
      likely:     'Mostly within range — you may want to try them on before committing.',
      borderline: 'A couple of dimensions are marginal. We\'d recommend trying before buying.',
      poor:       'One or more dimensions fall outside what would work for your foot.',
      unknown:    'We don\'t have enough data to make a confident recommendation.',
    };

    const FIT_LABEL = { green: 'Good', amber: 'Worth trying', red: 'Won\'t fit' };

    function metricHtml(cssClass, label, rec, status) {
      return `
        <div class="fit-metric ${cssClass}">
          <div class="metric-label">${label}</div>
          <div class="metric-rec">${rec}</div>
          <div class="metric-status ${cssClass}">${status}</div>
        </div>`;
    }

    function showResults(shoe, profile) {
      const lf = fitLength(profile.footLen, shoe);
      const wf = fitWidth(profile.footWidth, shoe);
      const tf = fitToeBox(profile.longestToe, shoe);

      const verdict = overallVerdict([lf, wf, tf]);
      const widthRec = bestWidthOption(profile.footWidth, shoe);
      const sizeRec  = (lf && lf !== 'red') ? recommendedSize(profile.footLen, shoe) : 'No size';

      const lHtml = lf
        ? metricHtml(lf, 'Length', sizeRec, lf === 'red' ? "Won't fit" : FIT_LABEL[lf])
        : metricHtml('na', 'Length', '—', 'No data');

      const wHtml = wf
        ? metricHtml(wf, 'Width', wf !== 'red' ? cap(widthRec || '—') : 'No option', wf === 'red' ? "Won't fit" : FIT_LABEL[wf])
        : metricHtml('na', 'Width', '—', 'No data');

      const tHtml = tf
        ? metricHtml(tf, 'Toe Box', cap(shoe.toeBoxShape || '—'), FIT_LABEL[tf])
        : metricHtml('na', 'Toe Box', '—', 'No data');

      const notes = buildNotes(shoe, profile);
      const notesHtml = notes.length ? `
        <ul class="notes-list">
          ${notes.map(n => `<li>${n}</li>`).join('')}
        </ul>` : '';

      document.getElementById('results').innerHTML = `
        <div class="card">
          <div class="result-shoe-name">${shoe.brand} ${shoe.model}</div>
          <div class="result-meta">
            <span class="result-category">${shoe.category || 'shoe'}</span>
          </div>
          <div class="metrics-label">Suggested Fit</div>
          <div class="fit-metrics">${lHtml}${wHtml}${tHtml}</div>
          <div class="verdict-row">
            <div class="verdict-pip ${verdict}"></div>
            <div class="verdict-copy">
              <strong>${VERDICT_LABEL[verdict]}.</strong> ${VERDICT_DESC[verdict]}
            </div>
          </div>
          ${notesHtml}
        </div>`;
      document.getElementById('results').classList.add('visible');
    }

    function showLoading() {
      document.getElementById('results').innerHTML =
        `<div class="card"><div class="loading">Finding your fit<span class="loading-dots"></span></div></div>`;
      document.getElementById('results').classList.add('visible');
    }

    function showError(msg) {
      document.getElementById('results').innerHTML =
        `<div class="card"><div class="error-msg">${msg}</div></div>`;
      document.getElementById('results').classList.add('visible');
    }

    function cap(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : str;
    }
  </script>
</body>
</html>
