<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fit Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ff-bg:      #FAF8F4;
      --ff-ink:     #1A1814;
      --ff-gold:    #C9B99A;
      --ff-border:  #D6CFC4;
      --ff-muted:   #8A8075;
      --ff-mid:     #5A5248;
      --ff-success: #7A9B6E;
      --ff-warn:    #B07B3A;
      --ff-serif:   'Cormorant Garamond', Georgia, serif;
      --ff-sans:    'Jost', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ff-sans);
      font-weight: 300;
      background: var(--ff-bg);
      color: var(--ff-ink);
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    /* --- HERO --- */
    .ff-hero {
      background: var(--ff-ink);
      color: var(--ff-bg);
      padding: 1.6rem 1.3rem 1.3rem;
      position: relative;
      overflow: hidden;
    }

    .ff-hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: repeating-linear-gradient(45deg, var(--ff-bg) 0, var(--ff-bg) 1px, transparent 0, transparent 50%);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .ff-eyebrow {
      font-family: var(--ff-sans);
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ff-gold);
      margin-bottom: 0.5rem;
    }

    .ff-title {
      font-family: var(--ff-serif);
      font-weight: 300;
      font-size: 2.8rem;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }

    .ff-title em {
      font-style: italic;
      color: var(--ff-gold);
    }

    .ff-hero-divider {
      width: 36px;
      height: 1px;
      background: var(--ff-gold);
      margin: 0.7rem 0;
    }

    .ff-subtitle {
      font-size: 9px;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: var(--ff-muted);
      text-transform: uppercase;
    }

    /* --- BODY --- */
    .ff-body {
      padding: 1.15rem 1.15rem 0;
      max-width: 640px;
    }

    /* --- SECTION LABELS --- */
    .ff-section-label {
      font-family: var(--ff-sans);
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ff-muted);
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ff-section-label::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--ff-border);
    }

    /* --- MEASUREMENTS GRID --- */
    .ff-measurements {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--ff-border);
      border: 0.5px solid var(--ff-border);
      margin-bottom: 1rem;
    }

    .ff-measure-cell {
      background: var(--ff-bg);
      padding: 0.65rem 0.6rem;
    }

    .ff-measure-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ff-muted);
      font-weight: 300;
      margin-bottom: 0.25rem;
    }

    .ff-measure-input {
      font-family: var(--ff-serif);
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--ff-ink);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      padding: 0;
      line-height: 1.2;
      -moz-appearance: textfield;
    }

    .ff-measure-input::-webkit-outer-spin-button,
    .ff-measure-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .ff-measure-input::placeholder {
      color: var(--ff-gold);
      font-style: italic;
    }

    .ff-measure-unit {
      font-size: 8px;
      color: var(--ff-muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
      font-weight: 200;
    }

    /* --- ATTRIBUTES --- */
    .ff-attributes {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--ff-border);
      border: 0.5px solid var(--ff-border);
      margin-bottom: 1rem;
    }

    .ff-attr-row {
      background: var(--ff-bg);
      display: flex;
      align-items: center;
      padding: 0.55rem 0.7rem;
      gap: 1rem;
    }

    .ff-attr-label {
      font-size: 8.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ff-muted);
      font-weight: 300;
      min-width: 80px;
      flex-shrink: 0;
    }

    .ff-chip-group {
      display: flex;
      gap: 4px;
    }

    .ff-chip {
      font-family: var(--ff-sans);
      font-size: 9.5px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 9px;
      border: 0.5px solid var(--ff-border);
      background: var(--ff-bg);
      color: var(--ff-mid);
      cursor: pointer;
      transition: all 0.12s ease;
      border-radius: 0;
    }

    .ff-chip:hover { border-color: var(--ff-muted); color: var(--ff-ink); }

    .ff-chip.active {
      background: var(--ff-ink);
      border-color: var(--ff-ink);
      color: var(--ff-bg);
    }

    /* --- SEARCH --- */
    .ff-search-block { margin-bottom: 1.25rem; }

    .ff-search-wrap {
      display: flex;
      gap: 1px;
      background: var(--ff-border);
      border: 0.5px solid var(--ff-border);
    }

    .ff-search-input {
      flex: 1;
      font-family: var(--ff-sans);
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.04em;
      padding: 0.55rem 0.7rem;
      border: none;
      outline: none;
      background: var(--ff-bg);
      color: var(--ff-ink);
    }

    .ff-search-input::placeholder { color: var(--ff-border); font-style: italic; }

    .ff-search-btn {
      font-family: var(--ff-sans);
      font-weight: 300;
      font-size: 8.5px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 0 1.15rem;
      background: var(--ff-ink);
      color: var(--ff-bg);
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
      white-space: nowrap;
    }

    .ff-search-btn:hover { background: #2E2922; }
    .ff-search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* --- RESULTS --- */
    #results { display: none; }
    #results.visible { display: block; }

    .ff-result {
      border: 0.5px solid var(--ff-border);
      background: var(--ff-bg);
      overflow: hidden;
    }

    .ff-result-header {
      background: var(--ff-ink);
      color: var(--ff-bg);
      padding: 0.8rem 0.8rem 0.65rem;
    }

    .ff-result-eyebrow {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ff-gold);
      margin-bottom: 0.25rem;
    }

    .ff-result-name {
      font-family: var(--ff-serif);
      font-size: 1.45rem;
      font-weight: 300;
      line-height: 1.15;
    }

    .ff-result-meta {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--ff-muted);
      text-transform: uppercase;
      margin-top: 0.2rem;
      font-weight: 200;
    }

    .ff-result-meta a {
      color: var(--ff-gold);
      text-decoration: none;
    }

    .ff-result-meta a:hover { text-decoration: underline; }

    /* --- VERDICT BAR --- */
    .ff-verdict-bar {
      display: flex;
      gap: 1px;
      background: var(--ff-border);
      border-top: 1px solid var(--ff-border);
    }

    .ff-verdict-item {
      flex: 1;
      background: var(--ff-bg);
      padding: 0.6rem 0.5rem;
      text-align: center;
    }

    .ff-verdict-dim {
      font-size: 7.5px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ff-muted);
      margin-bottom: 3px;
      font-weight: 300;
    }

    .ff-verdict-val {
      font-family: var(--ff-serif);
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--ff-ink);
      line-height: 1.2;
    }

    .ff-verdict-val.faded { color: var(--ff-border); font-style: italic; }

    .ff-verdict-rating {
      font-size: 7.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 3px;
      font-weight: 300;
    }

    .ff-verdict-rating.good { color: var(--ff-success); }
    .ff-verdict-rating.warn { color: var(--ff-warn); }
    .ff-verdict-rating.poor { color: #B05050; }
    .ff-verdict-rating.na   { color: var(--ff-border); }

    /* --- NOTES --- */
    .ff-result-notes {
      padding: 0.65rem 0.8rem;
      border-top: 0.5px solid var(--ff-border);
    }

    .ff-result-status {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 0.5rem;
    }

    .ff-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ff-success);
      flex-shrink: 0;
      margin-top: 4px;
    }

    .ff-status-dot.warn { background: var(--ff-warn); }
    .ff-status-dot.poor { background: #B05050; }

    .ff-status-text {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--ff-ink);
      line-height: 1.5;
    }

    .ff-note {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 5px;
    }

    .ff-note-dash {
      font-size: 11px;
      color: var(--ff-gold);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .ff-note-text {
      font-size: 11.5px;
      color: var(--ff-mid);
      line-height: 1.6;
      font-weight: 300;
    }

    /* --- ORNAMENT --- */
    .ff-ornament {
      text-align: center;
      color: var(--ff-gold);
      font-family: var(--ff-serif);
      font-size: 1rem;
      letter-spacing: 0.4em;
      padding: 1rem 0;
      opacity: 0.5;
    }

    /* --- LOADING / ERROR --- */
    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="ff-hero">
    <div class="ff-hero-pattern"></div>
    <div class="ff-eyebrow">Precision Fit Technology</div>
    <h1 class="ff-title">Fit <em>Finder</em></h1>
    <div class="ff-hero-divider"></div>
    <p class="ff-subtitle">Tell us about your feet. We'll tell you how a shoe fits.</p>
  </div>

  <!-- BODY -->
  <div class="ff-body">

    <div style="height:1rem"></div>
    <div class="ff-section-label">Your Measurements</div>
    <div class="ff-measurements">
      <div class="ff-measure-cell">
        <div class="ff-measure-label">Length</div>
        <input class="ff-measure-input" type="number" id="foot-length" placeholder="260" min="180" max="320">
        <div class="ff-measure-unit">mm</div>
      </div>
      <div class="ff-measure-cell">
        <div class="ff-measure-label">Width</div>
        <input class="ff-measure-input" type="number" id="foot-width" placeholder="95" min="60" max="130">
        <div class="ff-measure-unit">mm</div>
      </div>
      <div class="ff-measure-cell">
        <div class="ff-measure-label">Circumference</div>
        <input class="ff-measure-input" type="number" id="foot-circ" placeholder="—" min="180" max="310">
        <div class="ff-measure-unit">mm · optional</div>
      </div>
    </div>

    <div class="ff-section-label">Foot Profile</div>
    <div class="ff-attributes">
      <div class="ff-attr-row">
        <span class="ff-attr-label">Longest Toe</span>
        <div class="ff-chip-group" id="tg-toe">
          <button class="ff-chip active" data-value="big">Big</button>
          <button class="ff-chip" data-value="second">Second</button>
          <button class="ff-chip" data-value="even">Even</button>
        </div>
      </div>
      <div class="ff-attr-row">
        <span class="ff-attr-label">Arch Type</span>
        <div class="ff-chip-group" id="tg-arch">
          <button class="ff-chip" data-value="low">Low</button>
          <button class="ff-chip active" data-value="medium">Medium</button>
          <button class="ff-chip" data-value="high">High</button>
        </div>
      </div>
      <div class="ff-attr-row">
        <span class="ff-attr-label">Heel Width</span>
        <div class="ff-chip-group" id="tg-heel">
          <button class="ff-chip" data-value="narrow">Narrow</button>
          <button class="ff-chip active" data-value="medium">Medium</button>
          <button class="ff-chip" data-value="wide">Wide</button>
        </div>
      </div>
    </div>

    <div class="ff-section-label">Search a Shoe</div>
    <div class="ff-search-block">
      <div class="ff-search-wrap">
        <input class="ff-search-input" type="text" id="shoe-query" placeholder="Brand and model — e.g. Nike Air Max 90" autocomplete="off">
        <button class="ff-search-btn" id="search-btn">Find My Fit</button>
      </div>
    </div>

    <div id="results"></div>

    <div class="ff-ornament">· · ·</div>

  </div>

  <script>
    const PROFILE_KEY = 'fitfinder_v2_profile';

    // ── Profile ─────────────────────────────────────────────────────────────

    function getProfile() {
      return {
        footLen:    parseFloat(document.getElementById('foot-length').value) || null,
        footWidth:  parseFloat(document.getElementById('foot-width').value)  || null,
        footCirc:   parseFloat(document.getElementById('foot-circ').value)   || null,
        longestToe: getToggle('tg-toe'),
        archType:   getToggle('tg-arch'),
        heelWidth:  getToggle('tg-heel'),
      };
    }

    function getToggle(groupId) {
      const btn = document.querySelector(`#${groupId} .ff-chip.active`);
      return btn ? btn.dataset.value : null;
    }

    function setToggle(groupId, value) {
      document.querySelectorAll(`#${groupId} .ff-chip`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === value);
      });
    }

    function saveProfile() {
      localStorage.setItem(PROFILE_KEY, JSON.stringify(getProfile()));
    }

    function loadProfile() {
      const raw = localStorage.getItem(PROFILE_KEY);
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        if (p.footLen)    document.getElementById('foot-length').value = p.footLen;
        if (p.footWidth)  document.getElementById('foot-width').value  = p.footWidth;
        if (p.footCirc)   document.getElementById('foot-circ').value   = p.footCirc;
        if (p.longestToe) setToggle('tg-toe',  p.longestToe);
        if (p.archType)   setToggle('tg-arch', p.archType);
        if (p.heelWidth)  setToggle('tg-heel', p.heelWidth);
      } catch (e) {}
    }

    ['foot-length', 'foot-width', 'foot-circ'].forEach(id =>
      document.getElementById(id).addEventListener('input', saveProfile)
    );

    document.querySelectorAll('.ff-chip-group .ff-chip').forEach(btn => {
      btn.addEventListener('click', function () {
        this.closest('.ff-chip-group').querySelectorAll('.ff-chip')
          .forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        saveProfile();
      });
    });

    loadProfile();

    // ── Search ───────────────────────────────────────────────────────────────

    document.getElementById('search-btn').addEventListener('click', doSearch);

    document.getElementById('shoe-query').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const query = document.getElementById('shoe-query').value.trim();
      if (!query) return;

      const profile = getProfile();
      if (!profile.footLen || !profile.footWidth) {
        showError('Please enter your foot length and width before searching.');
        return;
      }

      const btn = document.getElementById('search-btn');
      btn.disabled = true;
      btn.textContent = 'Looking up…';
      showLoading();

      try {
        const resp = await fetch('/.netlify/functions/lookup-shoe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        if (!resp.ok) throw new Error('Server error ' + resp.status);

        const shoe = await resp.json();

        if (shoe.error) {
          showError('We could not find that shoe. Try including the brand name, e.g. Nike Air Max 90.');
        } else {
          showResults(shoe, profile);
        }
      } catch (e) {
        showError('Something went wrong — please check your connection and try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Find My Fit';
      }
    }

    // ── Fit logic ────────────────────────────────────────────────────────────

    function fitLength(footLen, shoe) {
      if (!shoe.lengthRange) return null;
      const thumbSpace = (shoe.category === 'heels') ? 8 : 10;
      const fitted = footLen + thumbSpace;
      const [min, max] = shoe.lengthRange;
      if (fitted >= min && fitted <= max) return 'green';
      if (fitted >= min - 7 && fitted <= max + 7) return 'amber';
      return 'red';
    }

    function fitWidth(footWidth, shoe) {
      if (!shoe.widths || Object.keys(shoe.widths).length === 0) return null;
      for (const [, [min, max]] of Object.entries(shoe.widths)) {
        if (footWidth >= min && footWidth <= max) return 'green';
      }
      for (const [, [min, max]] of Object.entries(shoe.widths)) {
        if (footWidth >= min - 3 && footWidth <= max + 3) return 'amber';
      }
      return 'red';
    }

    function bestWidthOption(footWidth, shoe) {
      if (!shoe.widths) return null;
      let best = null, bestDist = Infinity;
      for (const [name, [min, max]] of Object.entries(shoe.widths)) {
        const dist = Math.abs(footWidth - (min + max) / 2);
        if (dist < bestDist) { bestDist = dist; best = name; }
      }
      return best;
    }

    function fitToeBox(longestToe, shoe) {
      if (!shoe.toeBoxShape) return null;
      const shape = shoe.toeBoxShape;
      if (shape === 'square') return 'green';
      if (shape === 'round') return 'green';
      if (shape === 'tapered') {
        if (longestToe === 'second' || longestToe === 'even') return 'amber';
        return 'green';
      }
      return null;
    }

    function overallVerdict(fits) {
      const active = fits.filter(f => f !== null);
      if (active.length === 0) return 'unknown';
      if (active.includes('red')) return 'poor';
      if (active.every(f => f === 'green')) return 'good';
      if (active.filter(f => f === 'amber').length >= 2) return 'borderline';
      return 'likely';
    }

    function recommendedSize(footLen, shoe) {
      const thumbSpace = (shoe.category === 'heels') ? 8 : 10;
      const fitted = footLen + thumbSpace;
      const step = shoe.halfSizes === false ? 1 : 0.5;
      let rounded = Math.round((fitted / 6.67) / step) * step;
      if (shoe.sizing === 'runs_small') rounded += step;
      if (shoe.sizing === 'runs_large') rounded -= step;
      return 'EU ' + rounded;
    }

    function buildNotes(shoe, profile) {
      const notes = [];
      if (shoe.sizing === 'runs_small') notes.push('We\'ve recommended a size up — this shoe is known to come up small.');
      if (shoe.sizing === 'runs_large') notes.push('We\'ve recommended a size down — this shoe tends to run large.');
      if (shoe.fitNote) notes.push(shoe.fitNote);
      const { longestToe, archType, heelWidth } = profile;
      if (shoe.toeBoxShape === 'tapered' && (longestToe === 'second' || longestToe === 'even')) {
        notes.push('The tapered toe box may feel snug for your toe shape — a wide option or half size up could help.');
      }
      if (shoe.toeBoxShape === 'round' && longestToe === 'big') {
        notes.push('The round toe box should give your big toe plenty of room.');
      }
      if (archType === 'high' && (shoe.archSupport === 'neutral' || shoe.archSupport === 'mild')) {
        notes.push('This shoe has minimal arch support — an aftermarket insole may be worth considering.');
      }
      if (archType === 'low' && shoe.archSupport === 'high') {
        notes.push('The built-in arch support is quite pronounced, which can feel uncomfortable on flatter feet.');
      }
      if (heelWidth === 'narrow' && shoe.heelCupDepth === 'shallow') {
        notes.push('A shallow heel cup can cause slipping if you have a narrow heel.');
      }
      if (heelWidth === 'wide' && shoe.heelCupDepth === 'deep') {
        notes.push('The deep heel cup may feel tight around a wider heel.');
      }
      return notes;
    }

    // ── Render ───────────────────────────────────────────────────────────────

    const VERDICT_LABEL = {
      good:       'Looks like a great fit',
      likely:     'Should fit you well',
      borderline: 'Worth trying in store',
      poor:       'Unlikely to be your fit',
      unknown:    'Insufficient data',
    };

    const VERDICT_DESC = {
      good:       'All three dimensions sit comfortably within range for your foot.',
      likely:     'Mostly within range — you may want to try them on before committing.',
      borderline: 'A couple of dimensions are marginal. We\'d recommend trying before buying.',
      poor:       'One or more dimensions fall outside what would work for your foot.',
      unknown:    'We don\'t have enough data to make a confident recommendation.',
    };

    // map fit signal → design token class
    const FIT_CSS = { green: 'good', amber: 'warn', red: 'poor' };
    const FIT_LABEL = { green: 'Good', amber: 'Worth Trying', red: "Won't Fit" };

    const VERDICT_DOT = { good: '', likely: '', borderline: 'warn', poor: 'poor', unknown: 'warn' };

    function verdictItem(dim, val, fitSignal) {
      const cls = fitSignal ? FIT_CSS[fitSignal] : 'na';
      const label = fitSignal ? FIT_LABEL[fitSignal] : 'No Data';
      const valCls = fitSignal ? '' : ' faded';
      return `
        <div class="ff-verdict-item">
          <div class="ff-verdict-dim">${dim}</div>
          <div class="ff-verdict-val${valCls}">${val}</div>
          <div class="ff-verdict-rating ${cls}">${label}</div>
        </div>`;
    }

    function showResults(shoe, profile) {
      const lf = fitLength(profile.footLen, shoe);
      const wf = fitWidth(profile.footWidth, shoe);
      const tf = fitToeBox(profile.longestToe, shoe);

      const verdict = overallVerdict([lf, wf, tf]);
      const widthRec = bestWidthOption(profile.footWidth, shoe);
      const sizeRec  = (lf && lf !== 'red') ? recommendedSize(profile.footLen, shoe) : '—';
      const widthVal = wf && wf !== 'red' ? cap(widthRec || '—') : '—';
      const toeVal   = shoe.toeBoxShape ? cap(shoe.toeBoxShape) : '—';

      const notes = buildNotes(shoe, profile);
      const notesHtml = notes.map(n => `
        <div class="ff-note">
          <span class="ff-note-dash">—</span>
          <span class="ff-note-text">${n}</span>
        </div>`).join('');

      const dotClass = VERDICT_DOT[verdict];
      const imageUrl = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(shoe.brand + ' ' + shoe.model);

      document.getElementById('results').innerHTML = `
        <div class="ff-result">
          <div class="ff-result-header">
            <div class="ff-result-eyebrow">Fit Analysis</div>
            <div class="ff-result-name">${shoe.brand} ${shoe.model}</div>
            <div class="ff-result-meta">
              ${shoe.category || 'shoe'} &nbsp;·&nbsp;
              <a href="${imageUrl}" target="_blank" rel="noopener">See images →</a>
            </div>
          </div>
          <div class="ff-verdict-bar">
            ${verdictItem('Length', sizeRec, lf)}
            ${verdictItem('Width', widthVal, wf)}
            ${verdictItem('Toe Box', toeVal, tf)}
          </div>
          <div class="ff-result-notes">
            <div class="ff-result-status">
              <div class="ff-status-dot ${dotClass}"></div>
              <div class="ff-status-text"><strong>${VERDICT_LABEL[verdict]}.</strong> ${VERDICT_DESC[verdict]}</div>
            </div>
            ${notesHtml}
          </div>
        </div>`;
      document.getElementById('results').classList.add('visible');
    }

    function showLoading() {
      document.getElementById('results').innerHTML = `
        <div class="ff-result">
          <div class="ff-result-header">
            <div class="ff-result-eyebrow">Please Wait</div>
            <div class="ff-result-name" style="font-style:italic">Finding your fit<span class="loading-dots"></span></div>
          </div>
        </div>`;
      document.getElementById('results').classList.add('visible');
    }

    function showError(msg) {
      document.getElementById('results').innerHTML = `
        <div class="ff-result">
          <div class="ff-result-header">
            <div class="ff-result-eyebrow">Unable to Find</div>
            <div class="ff-result-name" style="font-size:1rem;line-height:1.5;font-weight:300">${msg}</div>
          </div>
        </div>`;
      document.getElementById('results').classList.add('visible');
    }

    function cap(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : str;
    }
  </script>
</body>
</html>
